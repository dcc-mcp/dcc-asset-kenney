tools:
  - name: search_kenney_assets
    description: Search Kenney public asset pages.
    source_file: scripts/search_kenney_assets.py
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: kenney
    input_schema:
      type: object
      properties:
        query:
          type: string
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 50
          default: 12
    output_schema:
      type: object

  - name: inspect_kenney_asset
    description: Inspect a Kenney asset page, license, and zip download URL.
    source_file: scripts/inspect_kenney_asset.py
    execution: sync
    affinity: any
    timeout_hint_secs: 20
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: kenney
    input_schema:
      type: object
      required: ["asset_url_or_slug"]
      properties:
        asset_url_or_slug:
          type: string
    output_schema:
      type: object

  - name: download_kenney_asset
    description: Download the zip from a Kenney asset page.
    source_file: scripts/download_kenney_asset.py
    execution: sync
    affinity: any
    timeout_hint_secs: 180
    enforce_thread_affinity: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true
    group: kenney
    input_schema:
      type: object
      required: ["asset_url_or_slug", "output_dir"]
      properties:
        asset_url_or_slug:
          type: string
        output_dir:
          type: string
    output_schema:
      type: object

